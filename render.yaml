services:
  - type: web
    name: npc-memory-backend
    runtime: docker
    plan: free
    region: oregon

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Database
      - key: DATABASE_URL
        sync: false
      
      # Application
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-domain.com
      - key: SERVICE_API_KEY
        generateValue: true
      - key: REQUIRE_SERVICE_API_KEY
        value: "true"
      - key: ALLOWED_EMAIL_DOMAINS
        value: ""
      - key: ALLOWED_EMAILS
        value: ""
      
      - key: HOST
        value: 0.0.0.0
      - key: LOG_LEVEL
        value: INFO
      
      # External LLM Configuration
      - key: USE_EXTERNAL_LLM
        value: "true"
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      
    healthCheckPath: /health
    autoDeploy: true
